name: verbatim
description: "Page de notes d'une diapositive (2 colonnes, debordement automatique)"
fields:
  content:
    required: []
    optional: []
notes: >
  Ce modele est genere automatiquement par dev.sh gen --verbatim a partir de
  verbatim.md dans le repertoire de chaque slide. Les champs slide_num et
  title_tex sont injectes par dev.sh, pas par l'utilisateur.
  Le fichier verbatim.md ne requiert pas de front matter YAML.
example: |
  # verbatim.md (pas de front matter necessaire)

  Texte des notes de la diapositive en Markdown.

  - Point cle 1
  - Point cle 2
    - Detail
