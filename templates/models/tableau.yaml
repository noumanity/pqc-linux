name: tableau
description: "Extension de plain : affiche un tableau chargé depuis un fichier CSV avec contrôle des largeurs de colonnes"
fields:
  content:
    required: []
    optional:
      - name: title
        description: "Titre de la diapositive"
        type: string
      - name: section
        description: "Titre de section affiché en bas à droite"
        type: string
      - name: csv
        description: "Chemin vers le fichier CSV (première ligne = en-têtes)"
        type: path
      - name: columns
        description: "Liste de specs de colonnes {ratio: float, wrap: bool}"
        type: "list<object>"
      - name: table-num
        description: "Numéro de tableau affiché au-dessus du tableau (optionnel)"
        type: string
  params:
    optional: []
notes: >
  Le champ csv est requis pour afficher un tableau. Les ratios de colonnes doivent
  sommer à au plus 1.0 ; s'ils dépassent, un avertissement est émis. Toutes les
  colonnes utilisent p{ratio*linewidth} ce qui autorise le saut de ligne ; le flag
  wrap est documentaire pour l'instant. Les variations plain/tableau sont possibles
  au sein d'un même content.md (changer diapo.model par variation).
example: |
  ---
  diapo:
    model: tableau
  content:
    title: "Mon tableau"
    section: "Ma section"
    csv: "@src/slide-05/donnees.csv"
    columns:
      - ratio: 0.30
        wrap: true
      - ratio: 0.35
        wrap: true
      - ratio: 0.35
        wrap: true
  ---
