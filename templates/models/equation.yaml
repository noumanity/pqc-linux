name: equation
description: "Dérivé de plain : affiche une équation ou formule centrée, large, en couleur d'accent"
fields:
  content:
    required: []
    optional:
      - name: title
        description: "Titre de la diapositive"
        type: string
      - name: equation
        description: "Texte de l'équation ou formule, affiché centré en grand"
        type: string
      - name: section
        description: "Titre de section affiché en bas à droite"
        type: string
  params:
    optional: []
notes: >
  Modèle dérivé de plain (numérotation et section identiques). L'équation est
  affichée en NoumanityOrange, police NouTitleFont (ABeeZee), 22pt, centrée dans
  un parbox de 0.85 linewidth pour permettre le retour à la ligne si nécessaire.
example: |
  ---
  diapo:
    model: equation
  content:
    title: "L'inégalité de Mosca"
    section: "Ma section"
    equation: "X (confidentialité) + Y (migration) > Z (Q-Day)"
  ---
